name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Sync to S3 + Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::533267262133:role/github-actions-deploy
          aws-region: eu-north-1

      - name: Sync site to S3
        run: |
          aws s3 sync . s3://pravinmishradmi-site-production \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude "terraform/*" \
            --exclude ".mcp.json" \
            --exclude "*.md" \
            --exclude "CLAUDE.md"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3V6O6MRE2E21P \
            --paths "/*"
